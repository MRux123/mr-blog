<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Archive | MR</title>
    <meta property="og:title" content="MR Blog | English Diary">
    <meta property="og:description" content="Mój dziennik i portfolio językowe. Zapraszam!">
    <meta property="og:image" content="https://blogrukszan.netlify.app/preview.jpg">
    <meta property="og:url" content="https://blogrukszan.netlify.app/">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.7; animation: float 25s infinite alternate ease-in-out; }
        .blob1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #d8b4fe; }
        .blob2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #93c5fd; animation-delay: -5s; }
        @keyframes float { 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* NAV — identyczny glass hover jak przycisk sortowania */
        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border); border-radius: 50px;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        nav a {
            display: block; padding: 12px 24px;
            text-decoration: none; color: var(--text-main);
            font-weight: 600; font-size: 0.9rem;
            white-space: nowrap;
            transition: color 0.3s ease, background-color 0.3s ease, backdrop-filter 0.3s ease;
        }
        nav a:hover {
            color: var(--accent);
            background-color: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        section { min-height: 100vh; padding: 120px 20px; max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .section-title { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 20px; background: linear-gradient(135deg, #1d1d1f, #434345); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }

        /* SORTOWANIE — identyczne z culture-archive */
        .sort-container { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 30px; margin-top: 20px; }
        .sort-select {
            appearance: none; -webkit-appearance: none; -moz-appearance: none;
            padding: 10px 45px 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border);
            background-color: var(--glass-bg); backdrop-filter: blur(20px);
            font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--text-main);
            cursor: pointer; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: all 0.3s ease;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231d1d1f%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 18px top 50%; background-size: 10px auto;
        }
        .sort-select:hover {
            color: var(--accent); background-color: rgba(255, 255, 255, 0.70); border-color: rgba(0, 113, 227, 0.2);
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%230071e3%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; width: 100%; }
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(150%); -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; box-shadow: var(--glass-shadow);
            transition: transform 0.4s ease, box-shadow 0.4s ease; cursor: pointer;
            display: flex; flex-direction: column; height: 100%;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .tag { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
        .card-text { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; flex-grow: 1; }
        .read-more { color: var(--accent); font-weight: 600; font-size: 0.95rem; margin-top: auto; }



        .reveal { opacity: 0; transform: translateY(50px) scale(0.95); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0) scale(1); }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

<nav>
    <a href="index.html#culture" onclick="triggerHaptic()">&larr; Go Back</a>
</nav>

    <section>
        <h1 class="section-title reveal">Blog Archive</h1>
        <p style="color: var(--text-muted); text-align: center;" class="reveal">All my previous journal entries and reflections.</p>

        <div class="sort-container reveal">
            <select id="sort-select" class="sort-select" onchange="renderGrid()">
                <option value="desc">Newest first</option>
                <option value="asc">Oldest first</option>
            </select>
        </div>

        <div class="grid-3" id="dynamic-grid">
            <p style="text-align:center; color: var(--text-muted); grid-column: 1/-1;">Loading entries...</p>
        </div>
    </section>



    <script>
        let allPosts = [];
        let sortedPosts = []; // globalnie, żeby onclick miał dostęp przez indeks

        function triggerHaptic() { if (navigator.vibrate) navigator.vibrate(50); }

        function renderGrid() {
            const grid = document.getElementById('dynamic-grid');
            const sortOrder = document.getElementById('sort-select').value;
            grid.innerHTML = '';

            if (!allPosts || allPosts.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">No entries yet. Add them in the Admin Panel.</p>';
                return;
            }

            sortedPosts = [...allPosts].sort((a, b) => {
                const da = new Date(a.date), db = new Date(b.date);
                return sortOrder === 'asc' ? da - db : db - da;
            });

            sortedPosts.forEach((post, index) => {
                const dateObj = new Date(post.date);
                const dateLabel = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                // HTML-safe tylko do wyświetlenia w kartach
                const safeTitle   = (post.title   || '').replace(/</g, '&lt;');
                const safeExcerpt = (post.excerpt || '').replace(/</g, '&lt;');

                grid.innerHTML += `
                    <div class="glass-card reveal" style="animation-delay: ${(index * 0.1).toFixed(1)}s"
                         onclick="window.location.href='article.html?id=${post.slug}'">
                        <span class="tag">${dateLabel}</span>
                        <h3 class="card-title">${safeTitle}</h3>
                        <p class="card-text">${safeExcerpt || 'Click to read the full entry...'}</p>
                        <span class="read-more">Read full text &rarr;</span>
                    </div>
                `;
            });

            // Odśwież observer na nowych kartach
            document.querySelectorAll('.reveal:not(.active)').forEach(el => observer.observe(el));
        }

        // Scrollytelling
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
                else if (entry.boundingClientRect.top > 0) entry.target.classList.remove('active');
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));



        // Fetch z baza-blog.json
        fetch('baza-blog.json')
            .then(res => {
                if (!res.ok) throw new Error('Not found');
                return res.json();
            })
            .then(data => {
                allPosts = data.posts || [];
                renderGrid();
            })
            .catch(() => {
                document.getElementById('dynamic-grid').innerHTML =
                    '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">No entries yet. Add the first one in the Admin Panel!</p>';
            });
    </script>
</body>
</html>
