<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | MR Blog</title>
    <link id="dynamic-favicon" rel="icon" type="image/jpeg" href="ikona-bloga.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg-color: #f5f5f7; --text-main: #1d1d1f; --text-muted: #86868b; --accent: #0071e3; --glass-bg: rgba(255, 255, 255, 0.45); --glass-border: rgba(255, 255, 255, 0.6); --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.7; animation: float 25s infinite alternate ease-in-out; }
        .blob1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #d8b4fe; }
        .blob2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #93c5fd; animation-delay: -5s; }
        @keyframes float { 100% { transform: translate(50px, 50px) scale(1.1); } }

        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border); border-radius: 50px;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        nav a { display: block; padding: 12px 24px; text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.95rem; transition: 0.3s; white-space: nowrap; }
        nav a:hover { color: var(--accent); background: rgba(0, 113, 227, 0.05); border-radius: 50px;}

        article { min-height: 100vh; padding: 120px 20px 80px 20px; max-width: 850px; margin: 0 auto; }
        .article-tag { font-size: 0.85rem; text-transform: uppercase; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; margin-bottom: 15px; display: inline-block; }
        .article-title { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 20px; line-height: 1.1; }
        
        .article-meta-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1); padding: 15px 0; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
        
        /* NOWOŚĆ: Sekcja autora ze zdjęciem */
        .author-wrapper { display: flex; align-items: center; gap: 15px; }
        .author-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .author-info { display: flex; flex-direction: column; }
        .author-name { font-weight: 700; color: var(--text-main); font-size: 1.05rem; }
        .update-time { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; margin-top: 2px; }
        .live-time { color: var(--accent); font-size: 0.85rem; font-weight: 600; margin-top: 2px; }
        
        /* NOWOŚĆ: Przyciski */
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 10px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--text-main); transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .action-btn:hover { background: white; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); }
        
        .share-btn { background: var(--text-main); color: white; border-color: var(--text-main); }
        .share-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .glass-container { background: var(--glass-bg); backdrop-filter: blur(40px) saturate(150%); -webkit-backdrop-filter: blur(40px) saturate(150%); border: 1px solid var(--glass-border); border-radius: 32px; padding: 50px; box-shadow: var(--glass-shadow); }
        .article-content p { font-size: 1.15rem; line-height: 1.8; color: #333; margin-bottom: 25px; }
        .article-content h3 { font-size: 1.8rem; font-weight: 700; margin: 40px 0 20px 0; letter-spacing: -0.02em; }
        @media (max-width: 600px) { .glass-container { padding: 30px 20px; } .article-meta-bar { flex-direction: column; align-items: flex-start; } }

        /* NOWOŚĆ: System Powiadomień (Bąbelek) */
        #toast { visibility: hidden; min-width: 250px; background: rgba(29, 29, 31, 0.95); backdrop-filter: blur(10px); color: #fff; text-align: center; border-radius: 50px; padding: 16px 24px; position: fixed; z-index: 9999; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px); font-size: 0.95rem; font-weight: 500; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); bottom: 40px; }
    </style>
</head>
<body>
    <div class="ambient-bg"><div class="blob blob1"></div><div class="blob blob2"></div></div>

    <nav>
        <a href="culture-archive.html" onclick="triggerHaptic()">&larr; Back to Archive</a>
    </nav>

    <article>
        <div class="article-header">
            <span class="article-tag" id="post-tag">Loading...</span>
            <h1 class="article-title" id="post-title">Loading Article...</h1>
        </div>

        <div class="article-meta-bar">
            <div class="author-wrapper">
                <img src="profile.jpg" alt="Author Profile" class="author-avatar" id="author-img" style="object-position: center 20%;">
                <div class="author-info">
                    <span class="author-name" id="post-author">By ...</span>
                    <span class="update-time" id="post-date">Published: ...</span>
                    <span class="live-time" id="live-clock">Warsaw Time: --:--:--</span>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn share-btn" onclick="handleShareClick()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    Share
                </button>
                <button class="action-btn" onclick="handleSaveClick()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    Save Story
                </button>
            </div>
        </div>

        <div class="glass-container">
            <div class="article-content" id="post-body">
                Fetching data from the secure database...
            </div>
        </div>
    </article>

    <div id="toast"></div>

    <script>
        function triggerHaptic() { if (navigator.vibrate) navigator.vibrate(50); }

        // --- Zegar na żywo dla Warszawy ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { timeZone: 'Europe/Warsaw', hour: '2-digit', minute:'2-digit', second:'2-digit' });
            document.getElementById('live-clock').innerText = "Current Warsaw Time: " + timeString;
        }
        setInterval(updateClock, 1000); // Odświeża co 1 sekundę
        updateClock(); // Uruchamia od razu

        // --- System Powiadomień (Toast) ---
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        // --- Obsługa Przycisków ---
        function handleSaveClick() {
            triggerHaptic();
            showToast("Log in to save stories to your personal reading list.");
        }

        function handleShareClick() {
            triggerHaptic();
            // Kopiuje aktualny link do schowka
            navigator.clipboard.writeText(window.location.href).then(() => {
                showToast("Link copied to clipboard! Ready to share.");
            }).catch(err => {
                showToast("Failed to copy link.");
                console.error('Error copying:', err);
            });
        }

        // --- Wyciąganie bazy danych ---
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            document.getElementById('post-body').innerHTML = "Error: No article ID provided in the link.";
        } else {
            fetch('baza-artykulow.json')
                .then(response => response.json())
                .then(data => {
                    const posts = data.posts || [];
                    const post = posts.find(p => p.slug === postId); 

                    if (post) {
                        const dateObj = new Date(post.date);
                        document.title = post.title + " | MR Blog";
                        document.getElementById('post-tag').innerText = "World Events";
                        document.getElementById('post-title').innerText = post.title;
                        document.getElementById('post-author').innerText = "By " + (post.author || "Michał Rukszan");
                        document.getElementById('post-date').innerText = "Published: " + dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        
                        document.getElementById('post-body').innerHTML = marked.parse(post.body);
                    } else {
                        document.getElementById('post-body').innerHTML = "Error: Article not found in the database.";
                    }
                })
                .catch(error => {
                    document.getElementById('post-body').innerHTML = "Database connection error.";
                });
        }
    </script>
</body>
</html>
